<div class="page">
  <div class="header">
    <h2>Presupuestos</h2>
    <button mat-raised-button color="primary" routerLink="/presupuestos/nuevo" [disabled]="loading()">
      <mat-icon>add</mat-icon>
      Nuevo presupuesto
    </button>
  </div>

  <mat-progress-bar *ngIf="loading()" mode="indeterminate" />

  <table mat-table [dataSource]="presupuestos()" class="mat-elevation-z1 full">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let p">{{ p.id }}</td>
    </ng-container>

    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let p">{{ p.fecha | date: 'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let p">{{ p.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="cliente">
      <th mat-header-cell *matHeaderCellDef>Cliente</th>
      <td mat-cell *matCellDef="let p">{{ p.clienteNombre || ('#' + p.clienteId) }}</td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let p">{{ p.total | number: '1.0-2' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols"></tr>
  </table>

  <p class="muted" *ngIf="!loading() && presupuestos().length === 0">
    No hay presupuestos todavía.
  </p>
</div>
