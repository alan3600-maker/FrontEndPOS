<div class="page">
  <div class="header">
    <h2>Sucursales</h2>
    <button mat-raised-button color="primary" (click)="crear()" [disabled]="loading()">
      <mat-icon>add</mat-icon>
      Nueva sucursal
    </button>
  </div>

  <mat-progress-bar *ngIf="loading()" mode="indeterminate" />

  <table mat-table [dataSource]="rows()" class="mat-elevation-z1" style="width: 100%">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let r">{{ r.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="direccion">
      <th mat-header-cell *matHeaderCellDef>Dirección</th>
      <td mat-cell *matCellDef="let r">{{ r.direccion || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let r">{{ r.telefono || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="activo">
      <th mat-header-cell *matHeaderCellDef>Activo</th>
      <td mat-cell *matCellDef="let r">{{ r.activo ? 'Sí' : 'No' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r" style="text-align: right">
        <button mat-icon-button (click)="editar(r)" [disabled]="loading()" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          (click)="toggleActivo(r)"
          [disabled]="loading()"
          [title]="r.activo ? 'Desactivar' : 'Activar'"
        >
          <mat-icon>{{ r.activo ? 'toggle_on' : 'toggle_off' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<style>
  .page {
    padding: 16px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  h2 {
    margin: 0;
  }
</style>
