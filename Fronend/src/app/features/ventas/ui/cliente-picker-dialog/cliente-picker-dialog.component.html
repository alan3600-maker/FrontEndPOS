<h2 mat-dialog-title>Seleccionar cliente</h2>

<div mat-dialog-content>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Buscar</mat-label>
    <input matInput (input)="onInput($any($event.target).value)" placeholder="Nombre / RUC / Teléfono" />
  </mat-form-field>

  <div class="muted" *ngIf="loading()">Buscando...</div>

  <mat-nav-list>
    <a mat-list-item *ngFor="let c of rows()" (click)="pick(c)">
      <div class="item">
        <div class="title">{{ c.nombreRazonSocial }}</div>
        <div class="sub">{{ c.ruc || '-' }} · {{ c.telefono || '-' }}</div>
      </div>
    </a>
  </mat-nav-list>

  <div class="muted" *ngIf="!loading() && rows().length === 0">
    Sin resultados.
  </div>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancelar</button>
</div>
