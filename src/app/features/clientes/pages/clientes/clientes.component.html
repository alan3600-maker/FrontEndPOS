<div class="header">
  <h2>Clientes</h2>

  <div class="actions">
    <mat-form-field appearance="outline" class="search">
      <mat-label>Buscar</mat-label>
      <input matInput (input)="onSearch($any($event.target).value)" placeholder="Nombre / RUC / Teléfono" />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="openCreate()" *hasPermiso="'CLIENTE_CRUD'">
      <mat-icon>add</mat-icon>
      Nuevo
    </button>
  </div>
</div>

<table mat-table [dataSource]="rows()">

  <ng-container matColumnDef="nombreRazonSocial">
    <th mat-header-cell *matHeaderCellDef>Nombre / Razón Social</th>
    <td mat-cell *matCellDef="let r">{{ r.nombreRazonSocial }}</td>
  </ng-container>

  <ng-container matColumnDef="ruc">
    <th mat-header-cell *matHeaderCellDef>RUC/CI</th>
    <td mat-cell *matCellDef="let r">{{ r.ruc || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="telefono">
    <th mat-header-cell *matHeaderCellDef>Teléfono</th>
    <td mat-cell *matCellDef="let r">{{ r.telefono || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let r" class="actions-col">
      <button mat-icon-button (click)="openEdit(r)" *hasPermiso="'CLIENTE_CRUD'">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="remove(r)" *hasPermiso="'CLIENTE_CRUD'">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols;"></tr>
</table>

<mat-paginator
  [length]="total()"
  [pageIndex]="page()"
  [pageSize]="size()"
  [pageSizeOptions]="[5,10,20,50]"
  (page)="onPage($event)">
</mat-paginator>
