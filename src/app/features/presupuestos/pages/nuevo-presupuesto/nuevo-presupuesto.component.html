<div class="wrap">
  <mat-card class="card">
    <mat-card-content class="content">
      <div class="header">
        <h2>Nuevo presupuesto</h2>

        <div class="actions">
          <button mat-stroked-button (click)="pickCliente()" [disabled]="busy()">
            <mat-icon>person</mat-icon>
            {{ cliente() ? 'Cambiar cliente' : 'Seleccionar cliente' }}
          </button>

          <button
            mat-raised-button
            color="primary"
            (click)="addProducto()"
            [disabled]="!cliente() || busy()"
          >
            <mat-icon>add</mat-icon>
            Agregar producto
          </button>
        </div>
      </div>

      <div class="meta" *ngIf="cliente() as c">
        <div><strong>Cliente:</strong> {{ c.nombreRazonSocial }}</div>
        <div class="muted">{{ c.ruc || '-' }} · {{ c.telefono || '-' }}</div>
      </div>

      <div class="table-wrap">
        <table mat-table [dataSource]="items()" class="mat-elevation-z1">
          <ng-container matColumnDef="descripcion">
            <th mat-header-cell *matHeaderCellDef>Producto</th>
            <td mat-cell *matCellDef="let it">{{ it.descripcion }}</td>
          </ng-container>
          <ng-container matColumnDef="cantidad">
            <th mat-header-cell *matHeaderCellDef>Cant.</th>
            <td mat-cell *matCellDef="let it; let i = index">
              <mat-form-field appearance="outline" class="cell-input">
                <input
                  matInput
                  type="number"
                  min="1"
                  [value]="it.cantidad"
                  (input)="updateCantidad(i, $any($event.target).value)"
                  [disabled]="busy()"
                />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="precio">
            <th mat-header-cell *matHeaderCellDef>Precio</th>
            <td mat-cell *matCellDef="let it; let i = index">
              <mat-form-field appearance="outline" class="cell-input">
                <input
                  matInput
                  type="number"
                  min="0"
                  [value]="it.precioUnitario"
                  (input)="updatePrecio(i, $any($event.target).value)"
                  [disabled]="busy()"
                />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let it">
              {{ it.totalLinea | number: '1.0-0' }}
            </td>
          </ng-container>
          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let it; let i = index">
              <button mat-icon-button (click)="remove(i)" [disabled]="busy()" aria-label="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="cols"></tr>
          <tr mat-row *matRowDef="let row; columns: cols"></tr>
        </table>

        <div class="empty" *ngIf="items().length === 0">Agregá al menos un producto.</div>
      </div>

      <div class="footer">
        <div class="total">
          <span>Total</span>
          <strong>{{ total() | number: '1.0-0' }}</strong>
        </div>

        <div class="actions">
          <button mat-button (click)="cancelar()" [disabled]="busy()">Cancelar</button>
          <button
            mat-raised-button
            color="primary"
            (click)="guardar()"
            [disabled]="busy() || !cliente() || items().length === 0"
          >
            Guardar presupuesto
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
