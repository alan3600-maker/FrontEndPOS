<div class="header">
  <h2>Productos</h2>

  <div class="actions">
    <mat-form-field appearance="outline" class="search">
      <mat-label>Buscar</mat-label>
      <input
        matInput
        (input)="onSearch($any($event.target).value)"
        placeholder="Descripción / Código"
      />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="openCreate()" *hasPermiso="'PRODUCTO_CRUD'">
      <mat-icon>add</mat-icon>
      Nuevo
    </button>
  </div>
</div>

<table mat-table [dataSource]="rows()">
  <ng-container matColumnDef="descripcion">
    <th mat-header-cell *matHeaderCellDef>Descripción</th>
    <td mat-cell *matCellDef="let r">{{ r.descripcion }}</td>
  </ng-container>
  <ng-container matColumnDef="sku">
    <th mat-header-cell *matHeaderCellDef>SKU</th>
    <td mat-cell *matCellDef="let r">{{ r.sku ?? '-' }}</td>
  </ng-container>
  <ng-container matColumnDef="precio">
    <th mat-header-cell *matHeaderCellDef>Precio</th>
    <td mat-cell *matCellDef="let r">{{ r.precio || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let r" class="actions-col">
      <button mat-icon-button (click)="openEdit(r)" *hasPermiso="'PRODUCTO_CRUD'">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="remove(r)" *hasPermiso="'PRODUCTO_CRUD'">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols"></tr>
</table>

<mat-paginator
  [length]="total()"
  [pageIndex]="page()"
  [pageSize]="size()"
  [pageSizeOptions]="[5, 10, 20, 50]"
  (page)="onPage($event)"
>
</mat-paginator>
